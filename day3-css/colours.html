<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Color Formats</title>
    <link rel="stylesheet" href="colors.css">
</head>
<body>

<h1>CSS Color Formats</h1>

<p>Below, the first four boxes use the same blue color represented in different ways. The fifth box uses the same blue with 50% transparency.</p>

<div class="box named">
    Named Color<br>
    blue
</div>

<div class="box hex">
    HEX Color<br>
    #0000FF
</div>

<div class="box rgb">
    RGB Color<br>
    rgb(0, 0, 255)
</div>

<div class="box hsl">
    HSL Color<br>
    hsl(240, 100%, 50%)
</div>

<div class="box rgba">
    RGBA Color (50% Transparent)<br>
    rgba(0, 0, 255, 0.5)
</div>

</body>
</html>
