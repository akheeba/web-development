<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display Property</title>
    <link rel="stylesheet" href="display.css">
</head>
<body>

    <h1>CSS Display Property Demonstration</h1>

    <hr>

    <h2>1. Block Display</h2>

    <div class="block">Block Box 1</div>
    <div class="block">Block Box 2</div>
    <div class="block">Block Box 3</div>

    <hr>

    <h2>2. Inline Display</h2>

    <span class="inline">Inline 1</span>
    <span class="inline">Inline 2</span>
    <span class="inline">Inline 3</span>

    <hr>

    <h2>3. Inline-Block Display</h2>

    <div class="inline-block">Box 1</div>
    <div class="inline-block">Box 2</div>
    <div class="inline-block">Box 3</div>

</body>
</html>
