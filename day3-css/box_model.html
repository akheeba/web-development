<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <link rel="stylesheet" href="box_model.css">
</head>
<body>

<h1>CSS Box Model Demonstration</h1>

<h2>1. Default Box (content-box)</h2>

<div class="content-box">
    Content Box
</div>

<p>
Width = 300px <br>
Padding = 20px <br>
Border = 10px <br>
Total Width = 300 + 20 + 20 + 10 + 10 = <strong>360px</strong>
</p>

<hr>

<h2>2. Border Box</h2>

<div class="border-box">
    Border Box
</div>

<p>
Width = 300px <br>
Padding = 20px <br>
Border = 10px <br>
Total Width = <strong>300px</strong> because of
<code>box-sizing: border-box</code>.
</p>

</body>
</html>
